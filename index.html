    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2c3e50; --secondary: #34495e; --wrong: #e74c3c; --correct: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; }
        .quiz-container { background: white; width: 100%; max-width: 900px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin: 0 auto; }
        h1 { text-align: center; color: var(--primary); border-bottom: 3px solid #2980b9; padding-bottom: 15px; font-size: 24px; }
        
        .home-screen { text-align: center; padding: 20px 0; }
        .university-logo { max-width: 100%; height: auto; max-height: 180px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .home-screen p { font-size: 18px; color: var(--secondary); margin-bottom: 30px; }
        .section-btn { display: block; width: 80%; max-width: 400px; margin: 10px auto; padding: 15px; border: none; border-radius: 12px; font-size: 18px; font-family: 'Tajawal', sans-serif; font-weight: bold; cursor: pointer; transition: 0.3s; background: #6b215c; color: white; box-shadow: 0 4px 15px rgba(107, 33, 92, 0.3); }
        .section-btn:hover { background: #4a1540; transform: translateY(-3px); }
        .btn-special { background: #27ae60; box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3); }
        .btn-special:hover { background: #1e8449; }

        .stats { display: flex; justify-content: space-between; align-items: center; background: #eee; padding: 15px 20px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; font-size: 16px;}
        
        .timer-container { color: #d35400; background: #fdebd0; padding: 5px 15px; border-radius: 8px; border: 2px solid #f39c12; }
        .timer-warning { color: white; background: #c0392b; border-color: #922b21; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .question { font-size: 19px; color: var(--secondary); line-height: 1.6; margin-bottom: 25px; border-right: 5px solid #2980b9; padding-right: 15px; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button.option { padding: 15px; border: 2px solid #ddd; border-radius: 12px; background: #fff; cursor: pointer; transition: 0.3s; font-family: 'Tajawal'; font-size: 16px; text-align: right; display: flex; align-items: center; }
        button.option:hover:not([disabled]) { border-color: #2980b9; background: #f9f9f9; }
        button.correct { background: var(--correct) !important; color: white; border-color: #1e8449; }
        button.wrong { background: var(--wrong) !important; color: white; border-color: #a93226; }
        
        #quiz-box, #result-box { display: none; }
        .result-screen { text-align: center; }
        .final-score { font-size: 40px; color: #6b215c; margin: 20px 0; }
        .btn-action { padding: 15px 30px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 10px; transition: 0.3s; font-family: 'Tajawal'; }
        .btn-pdf { background: #6b215c; color: white; }
        .btn-reload { background: var(--correct); color: white; }
        
        .review-section { margin-top: 40px; text-align: right; display: none; }
        .review-item { background: #fff; border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 10px; }
        .review-q { font-weight: bold; margin-bottom: 10px; color: var(--primary); }
        .review-opt { font-size: 14px; margin: 5px 0; padding: 8px; border-radius: 5px; }
        .opt-correct { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .opt-wrong { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        @media (max-width: 600px) { .options { grid-template-columns: 1fr; } .stats { flex-direction: column; gap: 10px; text-align: center; } }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="home-screen" class="home-screen">
        <!-- عرض الشعار داخل الموقع -->
        <img src="https://i.ibb.co/HfMZ581z/556557263-1098771872435254-8140759409777653520-n.png" alt="شعار جامعة القلم" class="university-logo">
        
        <h1>تطبيق اختبارات مادة البحث العلمي</h1>
        <p>يرجى اختيار النموذج الذي تود الامتحان به:من اعداد : زياد طارق عزيز</p>
        <button class="section-btn" onclick="selectSection(1)">أسئلة 2022-2023 (الفصل الأول)</button>
        <button class="section-btn" onclick="selectSection(2)">أسئلة 2024-2025 (الفصل الثاني)</button>
        <button class="section-btn" onclick="selectSection(3)">نموذج A (الفصل الأول - شامل)</button>

    </div>

    <div id="quiz-box">
        <h1 id="quiz-title">الاختبار</h1>
        <div class="stats">
            <span>السؤال: <span id="q-num">1</span> / <span id="total-qs">0</span></span>
            <div id="timer-box" class="timer-container">⏱️ الوقت: <span id="time-left">45</span> ث</div>
            <span>النتيجة: <span id="score">0</span></span>
        </div>
        <div id="question" class="question">جاري تحميل السؤال...</div>
        <div id="options" class="options"></div>
    </div>

    <div id="result-box" class="result-screen">
        <h1>انتهى الاختبار</h1>
        <div class="final-score" id="final-res">0 / 0</div>
        <div id="percent" style="font-size: 24px; font-weight: bold; margin-bottom: 20px;"></div>
        <button onclick="window.print()" class="btn-action btn-pdf">تحميل النتيجة كـ PDF 📄</button>
        <button onclick="location.reload()" class="btn-action btn-reload">الرجوع للقائمة الرئيسية 🔄</button>
        <div id="review-area" class="review-section">
            <h2 style="border-bottom: 2px solid var(--secondary); padding-bottom: 10px;">مراجعة الإجابات:</h2>
            <div id="review-list"></div>
        </div>
    </div>
</div>

<script>
// --- قواعد البيانات القديمة للامتحانات السابقة ---
const dataSection1 = [
    { q: "المقابلة المقننة تعني:", a: ["أن الإجابة مفتوحة", "أن الأسئلة والأجوبة مفتوحة", "أن الأسئلة والأجوبة مقننة", "لا شيء مما ذكر"], c: "أن الأسئلة والأجوبة مقننة" },
    { q: "الملاحظة بالمشاركة تعني:", a: ["ان يكون الباحث مختلطا بعينة البحث", "لا يختلط او يشارك الباحث عينة البحث", "ان البحث يعتمد على روايات افراد عينة البحث", "موقف مصطنع"], c: "ان يكون الباحث مختلطا بعينة البحث" },

    { q: "تعني المشكلة في البحث العلمي:", a: ["شيء يؤرق الباحث وهي نقطة خلاف وغموض", "مسلمة معلومة للباحث", "شيء متفق عليه", "موضوع لا يحتاج إلى تفسير"], c: "شيء يؤرق الباحث وهي نقطة خلاف وغموض" },

    { q: "التسلسل الصحيح لكتابة المصدر هو:", a: ["اللقب ، اسم الباحث او المؤلف، السنة ،اسم الكتاب، الجزء ، الطبعة ، مكان النشر ، الناشر", "اسم الباحث او المؤلف، اللقب، السنة، اسم الكتاب، الجزء، الطبعة، مكان النشر، الناشر", "اسم الكتاب ،اسم الباحث او المؤلف. اللقب ،السنة ، الجزء ، الطبعة ، مكان النشر ، الناشر", "لا يوجد تسلسل محدد"], c: "اللقب ، اسم الباحث او المؤلف، السنة ،اسم الكتاب، الجزء ، الطبعة ، مكان النشر ، الناشر" },
    { q: "الفرض الصفري يعني:", a: ["لا توجد فروق معنوية", "توجد فروق معنوية", "وجود ارتباط معنوي", "جميع ما سبق"], c: "لا توجد فروق معنوية" },

    { q: "العينة العشوائية يتم اختيارها بطريقة:", a: ["العمدية", "الصدفة", "القرعة", "التقسيم الطبقي"], c: "القرعة" },

    { q: "الاستبيان المفتوح يعني:", a: ["توجد فيه أجوبة مقننة ومغلقة", "توجد فيه أجوبة مفتوحة", "فيه أجوبة مغلقة ومفتوحة", "يختار فيه الطالب من خيارات محددة"], c: "توجد فيه أجوبة مفتوحة" },

    { q: "الفرض الاجرائي يتميز بأن صياغته تكون .........", a: ["صياغة غير موجهة", "صياغة موجهة", "صياغة عشوائية", "غير قابلة للقياس"], c: "صياغة موجهة" },
    { q: "انفراد المجموعة التجريبية بالمتغير المستقل يعني أن المنهج التجريبي يتعامل مع .........", a: ["متغير مستقل ومتغير تابع", "متغير مستقل فقط", "متغير تابع فقط", "لا يوجد متغيرات"], c: "متغير مستقل ومتغير تابع" }
];

const dataSection2 = [
    { q: "تعرف الملاحظة بأنها:", a: ["المشاهدة المقصودة والدقيقة وفحص الظاهرة بصورة طبيعية", "المشاهدة المقصودة والدقيقة وفحص الظاهرة بصورة اصطناعية", "لا تستخدم فيها الحواس", "موقف مصطنع"], c: "المشاهدة المقصودة والدقيقة وفحص الظاهرة بصورة طبيعية" },

    { q: "من عيوب المنهج التجريبي في دراسة السلوك الإنساني والرياضي:", a: ["التحكم الدقيق يسهل تعميم النتائج دائماً", "الإنسان ككائن حي قد يغير سلوكه إذا شعر أنه تحت المراقبة والتجريب (البيئة المصطنعة)", "يستخدم في المختبرات الكيميائية فقط", "لا يسمح باستخدام المعالجات الإحصائية المتقدمة"], c: "الإنسان ككائن حي قد يغير سلوكه إذا شعر أنه تحت المراقبة والتجريب (البيئة المصطنعة)" },
    { q: "البحث العلمي في مجال الطب الرياضي يبحث في:", a: ["طرق تدريس التربية الرياضية في المدارس الأساسية", "الوقاية من الإصابات الرياضية وتأهيل الرياضيين وتأثير المكملات والمنشطات", "تاريخ الألعاب الأولمبية القديمة", "حساب منحنيات التعلم للمهارات المعقدة"], c: "الوقاية من الإصابات الرياضية وتأهيل الرياضيين وتأثير المكملات والمنشطات" }

let questions = [];
let currentQIndex = 0;
let score = 0;
let userAnswers = [];
let timerInterval;
const TIME_LIMIT = 45; // تم زيادة الوقت لـ 45 ثانية لأن الأسئلة هنا أعمق وتحتاج قراءة
let timeLeft = TIME_LIMIT;

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function selectSection(sectionNum) {
    if(sectionNum === 1) {
        questions = shuffle([...dataSection1]);
        document.getElementById("quiz-title").innerText = "أسئلة 2022 - 2023 (الفصل الأول)";
    } else if(sectionNum === 2) {
        questions = shuffle([...dataSection2]);
        document.getElementById("quiz-title").innerText = "أسئلة 2024 - 2025 (الفصل الثاني)";
    } else if(sectionNum === 3) {
        questions = shuffle([...dataSection3]);
        document.getElementById("quiz-title").innerText = "نموذج A (الفصل الأول - شامل)";
    } else if(sectionNum === 6) {
        questions = shuffle([...dataSection6]); // البنك الجديد 100 سؤال
        document.getElementById("quiz-title").innerText = "بنك الأسئلة الشامل (100 سؤال مستنبطة)";
    }

    document.getElementById("home-screen").style.display = "none";
    document.getElementById("quiz-box").style.display = "block";
    startQuiz();
}

function startQuiz() {
    document.getElementById("total-qs").innerText = questions.length;
    currentQIndex = 0;
    score = 0;
    userAnswers = [];
    loadQuestion();
}

function startTimer() {
    timeLeft = TIME_LIMIT;
    document.getElementById("time-left").innerText = timeLeft;
    
    const timerBox = document.getElementById("timer-box");
    timerBox.classList.remove("timer-warning");

    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById("time-left").innerText = timeLeft;

        if (timeLeft <= 5) {
            timerBox.classList.add("timer-warning");
        }

        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            handleTimeOut();
        }
    }, 1000);
}

function handleTimeOut() {
    const allBtns = document.querySelectorAll(".option");
    allBtns.forEach(b => b.disabled = true);

    const currentQData = questions[currentQIndex];

    userAnswers.push({
        q: currentQData.q,
        options: currentQData.a,
        selected: "لم يتم الإجابة (انتهى الوقت) ❌",
        correct: currentQData.c
    });

    allBtns.forEach(b => {
        if (b.getAttribute("data-ans") === currentQData.c) {
            b.classList.add("correct");
        } else {
            b.style.opacity = "0.5";
        }
    });

    setTimeout(() => {
        currentQIndex++;
        loadQuestion();
    }, 1500);
}

function loadQuestion() {
    if (currentQIndex >= questions.length) {
        showResults();
        return;
    }

    const qData = questions[currentQIndex];
    document.getElementById("question").innerText = qData.q;
    document.getElementById("q-num").innerText = currentQIndex + 1;

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    // ترتيب الخيارات بشكل عشوائي في كل مرة لزيادة التحدي
    const shuffledOptions = shuffle([...qData.a]); 
    const labels = ["A", "B", "C", "D", "E"]; 

    shuffledOptions.forEach((opt, index) => {
        const btn = document.createElement("button");
        btn.className = "option";
        btn.setAttribute("data-ans", opt); 
        btn.innerHTML = `<span style="font-weight:bold; margin-left:10px;">${labels[index]})</span> ${opt}`;
        btn.onclick = () => checkAnswer(btn, opt, qData.c);
        optionsDiv.appendChild(btn);
    });

    startTimer();
}

function checkAnswer(btn, selected, correct) {
    clearInterval(timerInterval);

    const allBtns = document.querySelectorAll(".option");
    allBtns.forEach(b => b.disabled = true);

    userAnswers.push({
        q: questions[currentQIndex].q,
        options: questions[currentQIndex].a,
        selected: selected,
        correct: correct
    });

    if (selected === correct) {
        btn.classList.add("correct");
        score++;
    } else {
        btn.classList.add("wrong");
        allBtns.forEach(b => {
            if (b.getAttribute("data-ans") === correct) {
                b.classList.add("correct");
            }
        });
    }

    document.getElementById("score").innerText = score;

    setTimeout(() => {
        currentQIndex++;
        loadQuestion();
    }, 1500);
}

function showResults() {
    clearInterval(timerInterval); 
    document.getElementById("quiz-box").style.display = "none";
    document.getElementById("result-box").style.display = "block";
    document.getElementById("final-res").innerText = score + " / " + questions.length;
    let per = Math.round((score / questions.length) * 100);
    
    let resultMessage = "";
    if(per >= 90) resultMessage = "ممتاز جداً! 🏆";
    else if(per >= 75) resultMessage = "جيد جداً! 👍";
    else if(per >= 50) resultMessage = "مقبول، تحتاج لمراجعة الملزمة. 📚";
    else resultMessage = "عليك إعادة دراسة المادة جيداً! ⚠️";

    document.getElementById("percent").innerText = `النسبة: ${per}% - ${resultMessage}`;
    generateReview();
}

function generateReview() {
    const reviewList = document.getElementById("review-list");
    reviewList.innerHTML = "";

    userAnswers.forEach((item, index) => {
        const itemDiv = document.createElement("div");
        itemDiv.className = "review-item";

        let optionsHtml = "";
        item.options.forEach(opt => {
            let statusClass = "";
            if (opt === item.correct) statusClass = "opt-correct";
            else if (opt === item.selected && item.selected !== item.correct) statusClass = "opt-wrong";
            optionsHtml += `<div class="review-opt ${statusClass}">${opt}</div>`;
        });

        let timeoutMsg = "";
        if(item.selected === "لم يتم الإجابة (انتهى الوقت) ❌") {
            timeoutMsg = `<div style="color: #c0392b; font-weight:bold; margin-bottom:10px;">${item.selected}</div>`;
        }

        itemDiv.innerHTML = `
            <div class="review-q">${index + 1}. ${item.q}</div>
            ${timeoutMsg}
            ${optionsHtml}
        `;
        reviewList.appendChild(itemDiv);
    });
    document.getElementById("review-area").style.display = "block";
}
</script>
